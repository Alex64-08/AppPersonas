<!DOCTYPE html>
<html lang="es" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo de API - People</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <main class="container py-5">

        <section class="text-center mb-5">
            <h1 class="fw-bold">Consumo de API con JavaScript</h1>
            <p class="text-muted">
                Clase 12: Consumo de API - GET y POST
            </p>
        </section>

        <section class="card shadow-sm mb-5">
            <div class="card-header bg-success text-white">
                <h2 class="h5 mb-0">Agregar persona</h2>
            </div>

            <div class="card-body">
                <!-- Formulario para agregar personas -->
                 
                <form id="frmAddPerson">
                    
                    <input type="hidden" id="idPerson">

                    <div class="my-3 form-group">
                        <label for="txtName" class="form-label">Nombre:</label>
                        <input type="text" id="txtName" class="form-control" required>
                    </div>

                    <div class="my-3 form-group">
                        <label for="txtEmail" class="form-label">Correo:</label>
                        <input type="email" id="txtEmail" class="form-control" required>
                    </div>

                    <div class="my-3 form-group">
                        <label for="txtPhone" class="form-label">Teléfono:</label>
                        <input type="text" id="txtPhone" class="form-control" required>
                    </div>

                    <div class="form-group my-3">
                        <button id="btnAddPerson" class="btn btn-primary" type="submit">Guardar</button>
                        <button id="btnCancel" class="btn btn-secondary d-none">Cancelar</button>
                    </div>
                </form>
            </div>
        </section>


        <section class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h2 class="h5 mb-0">Lista de personas</h2>
            </div>

            <div class="card-body">

                <div id="mensaje" class="alert d-none" role="alert"></div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbPeople">
                            <!-- Aquí se cargarán las personas desde JavaScript -->
                        </tbody>
                    </table>
                </div>

            </div>
        </section>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/controllers/indexController.js"></script>

</body>

</html>
